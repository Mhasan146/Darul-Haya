# Build config for the Darul Haya UK site. This file is read from the
# `darulhaya-uk` base directory set in the Netlify site settings, so the paths
# below are relative to that folder.
[build]
  command = "npm run build"
  publish = ".next"

# Official Next.js runtime — required for Netlify to serve the App Router pages
# and the /api/contact route. Without it, Netlify serves an empty directory and
# every URL returns a "Page not found" 404.
[[plugins]]
  package = "@netlify/plugin-nextjs"

# Security headers applied to every response.
# unsafe-inline required for Next.js hydration scripts; tighten with nonces after testing.
[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self'; font-src 'self' https://fonts.gstatic.com; frame-ancestors 'none'"
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), interest-cohort=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    X-DNS-Prefetch-Control = "on"
